<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MindAR GLB Viewer</title>

  <!-- A-Frame MUST load before MindAR -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; width: 100vw; height: 100vh; }
  </style>
</head>
<body>

  <a-scene
    mindar-image="imageTargetSrc: ./new.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets timeout="10000">
      <!-- Preload the GLB model -->
      <a-asset-item id="model1" src="./model.glb"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="false"></a-camera>

    <!-- Image Target 0 -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-entity
        gltf-model="#model1"
        position="0 0 0"
        rotation="90 0 0"
        scale="0.1 0.1 0.1"
        animation-mixer>
      </a-entity>
    </a-entity>

  </a-scene>

</body>
</html>
